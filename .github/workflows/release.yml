name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      matrix:
        include:
          - os: windows-latest
            rid: win-x64
            artifact: linxmd.exe
          - os: ubuntu-latest
            rid: linux-x64
            artifact: linxmd
          - os: macos-latest
            rid: osx-arm64
            artifact: linxmd
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4

      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          dotnet-quality: 'preview'

      - name: Extract version from tag
        id: version
        shell: bash
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> $GITHUB_OUTPUT

      - name: Publish
        run: >
          dotnet publish src/Linxmd/Linxmd.csproj
          -c Release
          -r ${{ matrix.rid }}
          --self-contained true
          -p:PublishSingleFile=true
          -p:PublishTrimmed=true
          -p:Version=${{ steps.version.outputs.VERSION }}
          -o publish

      - name: Rename artifact (Linux/macOS)
        if: runner.os != 'Windows'
        run: mv publish/${{ matrix.artifact }} publish/linxmd-${{ matrix.rid }}

      - name: Rename artifact (Windows)
        if: runner.os == 'Windows'
        run: mv publish/${{ matrix.artifact }} publish/linxmd-${{ matrix.rid }}.exe

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: linxmd-${{ matrix.rid }}
          path: publish/linxmd-*

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: artifacts/*
          generate_release_notes: true
